<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js 框选功能演示</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
            background: #1a1a1a;
        }
        #container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 5px;
            font-size: 14px;
            z-index: 100;
        }
    </style>
</head>
<body>
    <div id="container"></div>
    <div id="info">
        <h3>Three.js 框选功能演示</h3>
        <p>按住 Ctrl 键并拖动鼠标进行框选</p>
        <p>选中的物体将会高亮显示</p>
        <p>使用鼠标左键旋转视角，滚轮缩放</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script>
        // SelectArea 类 - 原版核心框选逻辑
        class SelectArea {
            constructor(viewer) {
                this.renderer = viewer.renderer;
                this.camera = viewer.activeCamera;
                this.controls = viewer.controls;
                this.scene = viewer.scene;
                this.useSelect = false;
                this.models = [];
                this.selectionShape = null;
                this.startX = -Infinity;
                this.startY = -Infinity;
                this.startZ = 0;
                this.prevX = -Infinity;
                this.prevY = -Infinity;
                this.startPageX = 0;
                this.startPageY = 0;
                this.endPageX = 0;
                this.endPageY = 0;
                this.selectionPoints = [];
                this.rect = null;
                this.init();
            }

            setModel(model) {
                if (model) {
                    this.models.push(model);
                }
            }

            setCamera(camera) {
                this.camera = camera;
                if (camera.isPerspectiveCamera) {
                    this.camera.add(this.selectionShape);
                    this.selectionShape.position.z = -1;
                } else {
                    this.scene.add(this.selectionShape);
                    this.selectionShape.position.set(0, 0, 0);
                    this.selectionShape.rotation.set(0, 0, 0);
                    this.selectionShape.scale.set(1, 1, 1);
                }
            }

            changeMode(enabled) {
                if (this.useSelect === enabled) return;
                this.useSelect = enabled;
                if (this.controls.enabled != !this.useSelect) {
                    this.controls.enabled = !this.useSelect;
                }
            }

            init() {
                this.selectionShape = new THREE.Line(
                    new THREE.BufferGeometry(),
                    new THREE.LineBasicMaterial({ color: 0xffff00 })
                );
                this.selectionShape.material.color.set(0xffff00);
                this.selectionShape.renderOrder = 1;
                this.selectionShape.position.z = -1;
                this.selectionShape.material.depthTest = false;
                this.selectionShape.scale.setScalar(1);
                this.selectionShape.frustumCulled = false;
                this.camera.add(this.selectionShape);

                // 鼠标按下
                this.renderer.domElement.addEventListener('pointerdown', e => {
                    if (!this.useSelect) return;
                    this.prevX = e.clientX;
                    this.prevY = e.clientY;
                    this.rect = this.renderer.domElement.getBoundingClientRect();
                    this.startX = ((e.clientX - this.rect.left) / this.rect.width) * 2 - 1;
                    this.startY = -((e.clientY - this.rect.top) / this.rect.height) * 2 + 1;
                    this.startPageX = e.clientX;
                    this.startPageY = e.clientY;
                    this.selectionPoints.length = [];
                });

                // 鼠标抬起
                this.renderer.domElement.addEventListener('pointerup', () => {
                    if (!this.useSelect) return;
                    this.selectionShape.visible = false;
                    this.selectionPoints.length = [];
                    this.shape();
                });

                // 鼠标移动
                this.renderer.domElement.addEventListener('pointermove', e => {
                    if (!this.useSelect) return;
                    if (((1 & e.buttons)) === 0) return;

                    const ex = e.clientX;
                    const ey = e.clientY;
                    this.rect = this.renderer.domElement.getBoundingClientRect();
                    let nx = ((e.clientX - this.rect.left) / this.rect.width) * 2 - 1;
                    let ny = -((e.clientY - this.rect.top) / this.rect.height) * 2 + 1;

                    this.selectionPoints.length = 3 * 5;
                    this.selectionPoints[0] = this.startX;
                    this.selectionPoints[1] = this.startY;
                    this.selectionPoints[2] = this.startZ;
                    this.selectionPoints[3] = nx;
                    this.selectionPoints[4] = this.startY;
                    this.selectionPoints[5] = this.startZ;
                    this.selectionPoints[6] = nx;
                    this.selectionPoints[7] = ny;
                    this.selectionPoints[8] = this.startZ;
                    this.selectionPoints[9] = this.startX;
                    this.selectionPoints[10] = ny;
                    this.selectionPoints[11] = this.startZ;
                    this.selectionPoints[12] = this.startX;
                    this.selectionPoints[13] = this.startY;
                    this.selectionPoints[14] = this.startZ;

                    if (ex != this.prevX || ey != this.prevY) {
                        this.endPageX = e.clientX;
                        this.endPageY = e.clientY;
                        this.update();
                        if (!this.selectionShape.visible) this.selectionShape.visible = true;
                        this.prevX = ex;
                        this.prevY = ey;
                    }
                });
            }

            update() {
                if (!this.selectionShape || !this.useSelect) return;
                if (this.camera.isPerspectiveCamera) {
                    this.selectionShape.geometry.setAttribute(
                        'position',
                        new THREE.Float32BufferAttribute(this.selectionPoints, 3, false)
                    );
                    const yScale = Math.tan(THREE.MathUtils.DEG2RAD * this.camera.fov / 2) * this.selectionShape.position.z;
                    this.selectionShape.scale.set(-yScale, yScale * this.camera.aspect, 1);
                } else {
                    const startX = ((this.startPageX - this.rect.left) / this.rect.width) * 2 - 1;
                    const startY = -((this.startPageY - this.rect.top) / this.rect.height) * 2 + 1;
                    const endX = ((this.endPageX - this.rect.left) / this.rect.width) * 2 - 1;
                    const endY = -((this.endPageY - this.rect.top) / this.rect.height) * 2 + 1;

                    this.camera.updateProjectionMatrix();
                    let vec1 = new THREE.Vector3(startX, startY, -1).unproject(this.camera);
                    let vec2 = new THREE.Vector3(endX, startY, -1).unproject(this.camera);
                    let vec3 = new THREE.Vector3(endX, endY, -1).unproject(this.camera);
                    let vec4 = new THREE.Vector3(startX, endY, -1).unproject(this.camera);
                    let vec5 = vec1.clone();

                    let dir = new THREE.Vector3().getWorldDirection(new THREE.Vector3()).normalize();
                    vec1.add(dir.clone().multiplyScalar(1.1));
                    vec2.add(dir.clone().multiplyScalar(1.1));
                    vec3.add(dir.clone().multiplyScalar(1.1));
                    vec4.add(dir.clone().multiplyScalar(1.1));
                    vec5.add(dir.clone().multiplyScalar(1.1));

                    let points = [vec1, vec2, vec3, vec4, vec5];
                    this.selectionShape.geometry = new THREE.BufferGeometry().setFromPoints(points);
                }
            }

            setHighlightCB(cb) {
                this.highlightCB = cb;
            }

            shape() {
                let highlightObj = [];
                if (this.selectionPoints.length < 12) return [];

                let p1, p2, p3, p4;
                if (this.camera.isPerspectiveCamera) {
                    this.selectionShape.updateMatrixWorld(true);
                    p1 = new THREE.Vector3(this.selectionPoints[0], this.selectionPoints[1], this.selectionPoints[2])
                        .applyMatrix4(this.selectionShape.matrixWorld);
                    p2 = new THREE.Vector3(this.selectionPoints[3], this.selectionPoints[4], this.selectionPoints[5])
                        .applyMatrix4(this.selectionShape.matrixWorld);
                    p3 = new THREE.Vector3(this.selectionPoints[6], this.selectionPoints[7], this.selectionPoints[8])
                        .applyMatrix4(this.selectionShape.matrixWorld);
                    p4 = new THREE.Vector3(this.selectionPoints[9], this.selectionPoints[10], this.selectionPoints[11])
                        .applyMatrix4(this.selectionShape.matrixWorld);
                } else {
                    const position = this.selectionShape.geometry.getAttribute('position');
                    p1 = new THREE.Vector3(position.getX(0), position.getY(0), position.getZ(0));
                    p2 = new THREE.Vector3(position.getX(1), position.getY(1), position.getZ(1));
                    p3 = new THREE.Vector3(position.getX(2), position.getY(2), position.getZ(2));
                    p4 = new THREE.Vector3(position.getX(3), position.getY(3), position.getZ(3));
                }

                p1.project(this.camera);
                p2.project(this.camera);
                p3.project(this.camera);
                p4.project(this.camera);

                let maxX = Math.max(p1.x, p2.x, p3.x, p4.x);
                let maxY = Math.max(p1.y, p2.y, p3.y, p4.y);
                let minX = Math.min(p1.x, p2.x, p3.x, p4.x);
                let minY = Math.min(p1.y, p2.y, p3.y, p4.y);

                for (var i = 0; i < this.models.length; i++) {
                    this.models[i].traverse(node => {
                        if (node.isMesh) {
                            if (!node.visible) return;
                            let boxCenter = null;
                            if (node.geometry.boundingBox) {
                                boxCenter = node.geometry.boundingBox.getCenter(new THREE.Vector3());
                                boxCenter.applyMatrix4(node.matrixWorld);
                            } else {
                                let box = new THREE.Box3().expandByObject(node);
                                boxCenter = box.getCenter(new THREE.Vector3());
                            }

                            let pro = boxCenter.project(this.camera);
                            if (pro.x > minX && pro.x < maxX && pro.y > minY && pro.y < maxY) {
                                highlightObj.push(node);
                            }
                        }
                    });
                }

                if (this.highlightCB) this.highlightCB(highlightObj);
                return highlightObj;
            }
        }

        // 初始化场景
        let scene, camera, renderer, controls, selectArea;
        let objects = [];
        let selectedObjects = [];

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x222222);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(10, 10, 10);
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('container').appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;

            const ambientLight = new THREE.AmbientLight(0x404040);
            scene.add(ambientLight);
            const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
            directionalLight.position.set(5, 10, 5);
            scene.add(directionalLight);

            // 创建测试模型
            createTestObjects();

            // 初始化框选
            const viewer = {
                renderer: renderer,
                activeCamera: camera,
                controls: controls,
                scene: scene
            };
            selectArea = new SelectArea(viewer);
            objects.forEach(obj => selectArea.setModel(obj));

            // 高亮回调（原版自发光高亮，无模糊）
            selectArea.setHighlightCB((highlightedObjects) => {
                selectedObjects = highlightedObjects;
                objects.forEach(obj => {
                    obj.traverse(node => {
                        if (node.isMesh) {
                            if (highlightedObjects.includes(node)) {
                                node.material.emissive = new THREE.Color(0xff0000);
                                node.material.emissiveIntensity = 0.3;
                            } else {
                                node.material.emissive = new THREE.Color(0x000000);
                                node.material.emissiveIntensity = 0;
                            }
                        }
                    });
                });
            });

            // 键盘事件
            document.addEventListener('keydown', (e) => {
                if (e.ctrlKey) {
                    selectArea.changeMode(true);
                }
            });
            document.addEventListener('keyup', (e) => {
                if (e.key === 'Control') {
                    selectArea.changeMode(false);
                }
            });

            window.addEventListener('resize', onWindowResize);
        }

        function createTestObjects() {
            // 立方体
            for (let i = 0; i < 5; i++) {
                for (let j = 0; j < 5; j++) {
                    const geometry = new THREE.BoxGeometry(0.5, 0.5, 0.5);
                    const material = new THREE.MeshPhongMaterial({
                        color: new THREE.Color().setHSL(Math.random(), 0.7, 0.5)
                    });
                    const cube = new THREE.Mesh(geometry, material);
                    cube.position.set(i * 2 - 4, 0.25, j * 2 - 4);
                    cube.castShadow = true;
                    cube.receiveShadow = true;
                    scene.add(cube);
                    objects.push(cube);
                }
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            selectArea.update();
            renderer.render(scene, camera);
        }

        // 启动
        init();
        animate();
    </script>
</body>
</html>
